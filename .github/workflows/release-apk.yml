name: Build Release APK

# Workflow specifically for building signed release APKs
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        type: string

env:
  ACTIONS_RUNNER_DEBUG: true

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "✅ local.properties created"
      
      - name: Check keystore availability
        id: keystore_check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore secrets are configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Keystore secrets not found"
            echo "::warning::No KEYSTORE_BASE64 secret configured. Will build unsigned APK."
          fi
      
      - name: Decode keystore
        if: steps.keystore_check.outputs.available == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks
          echo "✅ Keystore file created"
          ls -lh app/release-keystore.jks
      
      - name: Build Signed Release APK
        if: steps.keystore_check.outputs.available == 'true'
        run: |
          echo "🔨 Building Signed Release APK with retry..."
          for attempt in {1..3}; do
            echo "Attempt $attempt of 3..."
            if ./gradlew assembleRelease --stacktrace --no-daemon --warning-mode=all; then
              echo "✅ Signed Release APK built successfully"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Build attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            else
              echo "❌ All build attempts failed"
              exit 1
            fi
          done
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Build Unsigned Release APK
        if: steps.keystore_check.outputs.available == 'false'
        run: |
          echo "🔨 Building Unsigned Release APK with retry..."
          for attempt in {1..3}; do
            if ./gradlew assembleRelease --stacktrace --no-daemon --warning-mode=all; then
              echo "⚠️ APK is unsigned - configure signing secrets for production"
              echo "✅ Unsigned Release APK built successfully"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Retrying in 15 seconds..."
              sleep 15
            fi
          done
          exit 1
      
      - name: Get version info
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION="${{ github.event.inputs.version_name }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.0-$(date +%Y%m%d)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"
      
      - name: Get APK info
        id: apk
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          
          if [ ! -f "$APK_FILE" ]; then
            echo "❌ APK file not found!"
            ls -la app/build/outputs/apk/ || true
            exit 1
          fi
          
          APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
          APK_SIZE_BYTES=$(stat -f%z "$APK_FILE" 2>/dev/null || stat -c%s "$APK_FILE")
          APK_NAME=$(basename "$APK_FILE")
          APK_SHA256=$(sha256sum "$APK_FILE" | cut -d' ' -f1)
          
          # Rename with version
          NEW_NAME="PDFX-v${{ steps.version.outputs.version }}-release.apk"
          NEW_PATH="app/build/outputs/apk/release/$NEW_NAME"
          mv "$APK_FILE" "$NEW_PATH"
          
          echo "file=$NEW_PATH" >> $GITHUB_OUTPUT
          echo "size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "size_bytes=$APK_SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "sha256=$APK_SHA256" >> $GITHUB_OUTPUT
          
          echo "✅ Release APK:"
          echo "   📦 Name: $NEW_NAME"
          echo "   📏 Size: $APK_SIZE ($APK_SIZE_BYTES bytes)"
          echo "   🔒 SHA256: $APK_SHA256"
          echo "   🔐 Signed: ${{ steps.keystore_check.outputs.available }}"
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFX-release-v${{ steps.version.outputs.version }}
          path: ${{ steps.apk.outputs.file }}
          retention-days: 90
      
      - name: Create checksum file
        run: |
          echo "${{ steps.apk.outputs.sha256 }}  ${{ steps.apk.outputs.name }}" > app/build/outputs/apk/release/SHA256SUMS.txt
          cat app/build/outputs/apk/release/SHA256SUMS.txt
      
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: PDFX-release-v${{ steps.version.outputs.version }}-checksum
          path: app/build/outputs/apk/release/SHA256SUMS.txt
          retention-days: 90
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.apk.outputs.file }}
            app/build/outputs/apk/release/SHA256SUMS.txt
          body: |
            ## PDFX v${{ steps.version.outputs.version }}
            
            ### 📦 APK Information
            - **File:** `${{ steps.apk.outputs.name }}`
            - **Size:** ${{ steps.apk.outputs.size }} (${{ steps.apk.outputs.size_bytes }} bytes)
            - **Signed:** ${{ steps.keystore_check.outputs.available == 'true' && '✅ Yes' || '⚠️ No (unsigned)' }}
            
            ### 🔒 SHA256 Checksum
            ```
            ${{ steps.apk.outputs.sha256 }}
            ```
            
            ### 📥 Installation
            1. Download the APK file
            2. Enable "Install from Unknown Sources" in Android settings
            3. Open the APK to install
            
            ### ✨ Features
            - Fast, minimal PDF reader
            - 10 accent colors + 12 reader backgrounds
            - 5 card styles
            - Zero network access (privacy-first)
            - Material 3 design
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          echo "### 🎉 Release APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`${{ steps.apk.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.apk.outputs.size }} (${{ steps.apk.outputs.size_bytes }} bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signed** | ${{ steps.keystore_check.outputs.available == 'true' && '✅ Yes' || '⚠️ No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🔒 SHA256 Checksum" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.apk.outputs.sha256 }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.keystore_check.outputs.available }}" == "false" ]; then
            echo "### ⚠️ Important: APK is Unsigned" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To build signed APKs, configure these GitHub secrets:" >> $GITHUB_STEP_SUMMARY
            echo "- \`KEYSTORE_BASE64\` - Base64-encoded keystore file" >> $GITHUB_STEP_SUMMARY
            echo "- \`KEYSTORE_PASSWORD\` - Keystore password" >> $GITHUB_STEP_SUMMARY
            echo "- \`KEY_ALIAS\` - Key alias" >> $GITHUB_STEP_SUMMARY
            echo "- \`KEY_PASSWORD\` - Key password" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "📥 Download from the **Artifacts** section below" >> $GITHUB_STEP_SUMMARY
      
      - name: Cleanup keystore
        if: always() && steps.keystore_check.outputs.available == 'true'
        run: |
          rm -f app/release-keystore.jks
          echo "🧹 Keystore file removed"
