name: Build Debug APK

# Simple workflow for building debug APKs - no signing required
on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'preview/**'
      - '.gitignore'
      - 'PERFORMANCE*.md'
      - 'OPTIMIZATION*.txt'
  workflow_dispatch:

env:
  ACTIONS_RUNNER_DEBUG: true

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          cache-disabled: false
          cache-read-only: false
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "✅ local.properties created"
          cat local.properties
      
      - name: Verify Android SDK
        run: |
          echo "Android SDK: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT || true
      
      - name: Verify project structure
        run: |
          echo "📁 Verifying Kotlin source files..."
          find app/src/main/java -name "*.kt" | head -20
          echo ""
          echo "Total Kotlin files: $(find app/src/main/java -name '*.kt' | wc -l)"
      
      - name: Build Debug APK
        run: |
          echo "🔨 Building Debug APK with retry logic..."
          
          for attempt in {1..3}; do
            echo "Attempt $attempt of 3..."
            
            if ./gradlew assembleDebug --stacktrace --info --no-daemon --warning-mode=all; then
              echo "✅ Debug APK built successfully"
              exit 0
            fi
            
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Build attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            else
              echo "❌ All build attempts failed"
              exit 1
            fi
          done
      
      - name: Get APK info
        id: apk
        run: |
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          
          if [ ! -f "$APK_FILE" ]; then
            echo "❌ APK file not found!"
            echo "Directory contents:"
            ls -la app/build/outputs/apk/ || true
            exit 1
          fi
          
          APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
          APK_SIZE_BYTES=$(stat -f%z "$APK_FILE" 2>/dev/null || stat -c%s "$APK_FILE")
          APK_NAME=$(basename "$APK_FILE")
          APK_SHA256=$(sha256sum "$APK_FILE" | cut -d' ' -f1)
          
          echo "file=$APK_FILE" >> $GITHUB_OUTPUT
          echo "size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "size_bytes=$APK_SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "sha256=$APK_SHA256" >> $GITHUB_OUTPUT
          
          echo "✅ APK Information:"
          echo "   📦 Name: $APK_NAME"
          echo "   📏 Size: $APK_SIZE ($APK_SIZE_BYTES bytes)"
          echo "   🔒 SHA256: $APK_SHA256"
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFX-debug-${{ github.run_number }}
          path: ${{ steps.apk.outputs.file }}
          retention-days: 30
      
      - name: Summary
        run: |
          echo "### ✅ Debug APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`${{ steps.apk.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.apk.outputs.size }} (${{ steps.apk.outputs.size_bytes }} bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🔒 SHA256 Checksum" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.apk.outputs.sha256 }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from the **Artifacts** section below" >> $GITHUB_STEP_SUMMARY
